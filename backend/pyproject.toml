[tool.ruff]
target-version = "py312"
line-length = 120
src = ["app"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

# Editor / formatter config: set common defaults so tooling and editors
# (and CI) use a consistent 120-character line length.
[tool.black]
line-length = 120

[tool.flake8]
max-line-length = 120
exclude = [".venv", "venv", "__pycache__", "build", "dist"]
